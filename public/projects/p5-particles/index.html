<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5 Particles</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 20%, #2d3354 0%, #11131a 40%, #090a0f 100%);
        color: #f2f4ff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }

      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(6px);
        line-height: 1.4;
      }

      .hud h1 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .hud p {
        margin: 4px 0 0;
        font-size: 12px;
        color: #ccd3ff;
      }
    </style>
  </head>
  <body>
    <div class="hud">
      <h1>p5 Particle Sketch</h1>
      <p>Move mouse: attract particles</p>
      <p>Click: burst effect</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="./sketch.js"></script>
  </body>
</html>
